<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PowerBarn Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0e0f12;
           color:#e8e8ea; min-height:100vh; display:grid; place-items:center; }
    .card { width:min(560px, 92vw); padding:2rem; text-align:center; }
    h1 { margin:0; font-size:2.6rem; letter-spacing:.5px; }
    h1 .barn { color:#f5a623; }
    .ver { color:#8a8f98; margin:.25rem 0 1.75rem; font-size:.95rem; }
    label { display:inline-block; margin:.25rem 0; color:#c8ccd2; }
    select, input { background:#16181d; color:#e8e8ea; border:1px solid #2a2d35;
                    border-radius:8px; padding:.5rem .6rem; font-size:.95rem; }
    input { width:min(320px, 80vw); margin:.3rem 0; }
    button { background:#f5a623; color:#1a1300; border:0; border-radius:8px;
             padding:.55rem 1rem; font-weight:600; cursor:pointer; font-size:.95rem; }
    button:hover { filter:brightness(1.08); }
    esp-web-install-button { display:inline-block; margin:.75rem 0; }
    section { margin-top:1.75rem; padding-top:1.25rem; border-top:1px solid #20232b; }
    h3 { margin:.25rem 0 .75rem; font-weight:600; }
    pre { text-align:left; white-space:pre-wrap; word-break:break-word; color:#8a8f98;
          font-size:.8rem; max-height:180px; overflow:auto; }
    .note { color:#8a8f98; font-size:.85rem; margin-top:1.75rem; line-height:1.55; }
    a { color:#6ea8fe; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Power<span class="barn">Barn</span></h1>
    <div class="ver">Flasher &middot; v0.16b</div>

    <div>
      <label for="board">Board:</label>
      <select id="board">
        <option value="manifests/heltec-v3.json">Heltec V3 (ESP32-S3)</option>
      </select>
    </div>

    <div>
      <esp-web-install-button id="btn" manifest="manifests/heltec-v3.json"></esp-web-install-button>
    </div>

    <section id="wifi">
      <h3>WiFi instellen</h3>
      <div><input id="ssid" placeholder="SSID" autocomplete="off" autocapitalize="off" spellcheck="false" /></div>
      <div><input id="pwd" type="password" placeholder="Wachtwoord" autocomplete="off" /></div>
      <div><button id="wifiBtn">WiFi naar device sturen</button></div>
      <pre id="wifiLog"></pre>
    </section>

    <p class="note">
      Werkt in <strong>Chrome</strong> of <strong>Edge</strong> (WebSerial). Sluit de Heltec via USB
      aan; houd zo nodig de <strong>BOOT</strong>-knop ingedrukt bij het verbinden.<br />
      De nRF52 <em>Seeed Solar Node</em> flash je los via UF2 (drag-drop) &mdash; niet via deze tool.
    </p>
  </main>

  <script>
    // Board-dropdown wisselt het manifest van de install-knop.
    const sel = document.getElementById('board');
    const btn = document.getElementById('btn');
    sel.addEventListener('change', () => btn.setAttribute('manifest', sel.value));

    // WiFi-provisioning: stuur onze eigen `set wifi.*`-commando's over WebSerial.
    const log = (m) => { document.getElementById('wifiLog').textContent += m + "\n"; };
    document.getElementById('wifiBtn').addEventListener('click', async () => {
      const ssid = document.getElementById('ssid').value;
      const pwd  = document.getElementById('pwd').value;
      if (!('serial' in navigator)) { log('WebSerial niet ondersteund (gebruik Chrome/Edge).'); return; }
      if (!ssid) { log('Vul een SSID in.'); return; }
      let port;
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const enc = new TextEncoder();
        const dec = new TextDecoder();
        const writer = port.writable.getWriter();
        const reader = port.readable.getReader();
        // Lees ~1.5s echo mee voor bevestiging.
        const readFor = (ms) => new Promise((res) => {
          const t = setTimeout(res, ms);
          (async () => {
            try {
              while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) log(dec.decode(value).trim());
              }
            } catch (_) {}
            clearTimeout(t); res();
          })();
        });
        for (const cmd of [`set wifi.ssid ${ssid}`, `set wifi.pwd ${pwd}`, 'reboot']) {
          await writer.write(enc.encode(cmd + "\n"));
          log('> ' + (cmd.startsWith('set wifi.pwd') ? 'set wifi.pwd ******' : cmd));
        }
        await readFor(1500);
        try { reader.releaseLock(); } catch (_) {}
        try { writer.releaseLock(); } catch (_) {}
        await port.close();
        log('Klaar — device herstart met de nieuwe WiFi-instellingen.');
      } catch (e) {
        log('Fout: ' + e.message);
        try { await port?.close(); } catch (_) {}
      }
    });
  </script>
</body>
</html>
